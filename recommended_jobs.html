      gap: 6px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff7e8;
      font-weight: 700;
    }

    .toolbar {

      gap: 12px;
      margin-top: 18px;
    }

    input[type="search"] {
      width: 100%;

      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fffdf7;
      color: var(--ink);
      font: inherit;

    button {
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #2b3b25;
      color: #fffaf0;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
    }

    button.secondary {
      background: #fff7e8;
      color: var(--ink);
    }

    .notice {
      margin-top: 16px;
      padding: 14px;
      border: 1px dashed #b98b42;
      border-radius: 14px;
      background: #fff8e8;
      color: #5a4020;
    }

    .job-card {
      margin-bottom: 14px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--card);
      box-shadow: var(--shadow);
      transition: opacity 160ms ease, border-color 160ms ease, transform 160ms ease;
    }

    .job-card:hover {
      transform: translateY(-1px);
    }

    .job-card.applied {
      border-color: #6fa160;
      background: linear-gradient(135deg, var(--applied), #fffaf0 72%);
      opacity: 0.78;
    }

    .job-topline {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
    }

    .job-title {
      margin: 0;
      font-size: 1.08rem;
    }

    .job-meta,
    .job-reason,
    .job-foot {
      color: var(--muted);
    }

    .job-meta {
      margin: 8px 0 0;
    }

    .job-reason {
      margin: 10px 0;
    }

    .job-actions {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .applied-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
    }

    .applied-toggle input {
      width: 18px;
      height: 18px;
      accent-color: var(--go);
    }

    a {
      color: #174f90;
      font-weight: 700;
    }

    .score {
      padding: 6px 10px;
      border-radius: 999px;
      background: #efe3ca;
      font-weight: 800;
    }

    .go-label {
      color: var(--go);
    }

    .consider-label {
      color: var(--consider);
    }

    .hidden {
      display: none;
    }

    @media (max-width: 760px) {
      main {
        width: min(100vw - 22px, 1180px);
        padding-top: 14px;
      }

      header {
        padding: 18px;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }
    }

  <script>
    const dataFile = "recommended_jobs_from_all_sources.json";
    const appliedStorageKey = "job_scout_applied_jobs_v1";

    let recommendations = null;
    let appliedJobs = loadAppliedJobs();
    let hideApplied = false;

    const elements = {
      generatedText: document.getElementById("generatedText"),
      goCount: document.getElementById("goCount"),
      considerCount: document.getElementById("considerCount"),
      totalCount: document.getElementById("totalCount"),
      appliedCount: document.getElementById("appliedCount"),
      goVisibleCount: document.getElementById("goVisibleCount"),
      considerVisibleCount: document.getElementById("considerVisibleCount"),
      goJobs: document.getElementById("goJobs"),
      considerJobs: document.getElementById("considerJobs"),
      searchInput: document.getElementById("searchInput"),
      toggleAppliedButton: document.getElementById("toggleAppliedButton"),
      exportButton: document.getElementById("exportButton"),
      loadNotice: document.getElementById("loadNotice"),
    };

    function loadAppliedJobs() {
      try {
        const stored = window.localStorage.getItem(appliedStorageKey);
        return stored ? JSON.parse(stored) : {};
      } catch {
        return {};
      }
    }

    function saveAppliedJobs() {
      try {
        window.localStorage.setItem(appliedStorageKey, JSON.stringify(appliedJobs));
      } catch {
        showNotice("Could not save applied status. Your browser may be blocking localStorage.");
      }
    }

    function showNotice(message) {
      elements.loadNotice.textContent = message;
      elements.loadNotice.classList.remove("hidden");
    }

    function jobTrackingId(job) {
      return job.job_id || job.link || `${job.company || ""}-${job.title || ""}`;
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function matchesSearch(job, search) {
      if (!search) {
        return true;
      }
      const haystack = [
        job.title,
        job.company,
        job.location,
        job.why,
        job.query,
        ...(job.seen_as_queries || []),
        ...(job.matched_queries || []),
      ].join(" ").toLowerCase();
      return haystack.includes(search.toLowerCase());
    }

    function renderJob(job) {
      const id = jobTrackingId(job);
      const isApplied = Boolean(appliedJobs[id]);
      const appliedClass = isApplied ? " applied" : "";
      const labelClass = job.decision === "GO" ? "go-label" : "consider-label";

      return `
        <article class="job-card${appliedClass}" data-job-id="${escapeHtml(id)}">
          <div class="job-topline">
            <h3 class="job-title">${job.application_order}. ${escapeHtml(job.title)}</h3>
            <div class="job-actions">
              <label class="applied-toggle">
                <input type="checkbox" ${isApplied ? "checked" : ""} data-apply-toggle="${escapeHtml(id)}" />
                Applied
              </label>
              <span class="score">Score: ${escapeHtml(job.score)}</span>
            </div>
          </div>
          <p class="job-meta">${escapeHtml(job.company)} - ${escapeHtml(job.location || "Location not listed")}</p>
          <p class="job-reason">${escapeHtml(job.why)}</p>
          <a href="${escapeHtml(job.link)}" target="_blank" rel="noreferrer">Open LinkedIn job</a>
          <div class="job-foot">
            <span class="${labelClass}">${escapeHtml(job.decision)}</span>
            | Tier: ${escapeHtml(job.match_tier)}
            | Job ID: ${escapeHtml(job.job_id)}
          </div>
          ${isApplied ? '<div class="go-label" style="margin-top:8px;font-weight:700;">Applied - saved in this browser</div>' : ""}
        </article>
      `;
    }

    function render() {
      if (!recommendations) {
        return;
      }

      const search = elements.searchInput.value.trim();
      const goJobs = recommendations.go_jobs_apply_first || [];
      const considerJobs = recommendations.consider_jobs_apply_selectively || [];

      const visibleGo = goJobs.filter((job) => matchesSearch(job, search) && (!hideApplied || !appliedJobs[jobTrackingId(job)]));
      const visibleConsider = considerJobs.filter((job) => matchesSearch(job, search) && (!hideApplied || !appliedJobs[jobTrackingId(job)]));

      elements.goJobs.innerHTML = visibleGo.map(renderJob).join("");
      elements.considerJobs.innerHTML = visibleConsider.map(renderJob).join("");
      elements.goVisibleCount.textContent = visibleGo.length;
      elements.considerVisibleCount.textContent = visibleConsider.length;
      elements.appliedCount.textContent = Object.keys(appliedJobs).length;
    }

    function initializeSummary(data) {
      const summary = data.summary || {};
      const goJobs = data.go_jobs_apply_first || [];
      const considerJobs = data.consider_jobs_apply_selectively || [];
      elements.generatedText.textContent = `Generated at ${data.generated_at || "unknown time"}. Applied checkboxes are saved in this browser.`;
      elements.goCount.textContent = summary.unique_go_jobs_after_merging_all_sources || goJobs.length;
      elements.considerCount.textContent = summary.unique_consider_jobs_after_merging_all_sources || considerJobs.length;
      elements.totalCount.textContent = summary.unique_recommended_jobs_total || (goJobs.length + considerJobs.length);
    }

    function handleToggle(event) {
      const checkbox = event.target.closest("[data-apply-toggle]");
      if (!checkbox) {
        return;
      }

      const id = checkbox.getAttribute("data-apply-toggle");
      const allJobs = [
        ...(recommendations.go_jobs_apply_first || []),
        ...(recommendations.consider_jobs_apply_selectively || []),
      ];
      const job = allJobs.find((item) => jobTrackingId(item) === id);

      if (!job) {
        return;
      }

      if (appliedJobs[id]) {
        delete appliedJobs[id];
      } else {
        appliedJobs[id] = {
          applied_at: new Date().toISOString(),
          title: job.title,
          company: job.company,
          link: job.link,
          job_id: job.job_id,
          decision: job.decision,
          score: job.score,
        };
      }

      saveAppliedJobs();
      render();
    }

    function exportAppliedJobs() {
      const blob = new Blob([JSON.stringify(appliedJobs, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "applied_jobs_export.json";
      link.click();
      URL.revokeObjectURL(url);
    }

    function loadEmbeddedRecommendations() {
      const embedded = document.getElementById("embeddedRecommendations");
      if (!embedded || !embedded.textContent.trim()) {
        return null;
      }
      return JSON.parse(embedded.textContent);
    }

    async function loadRecommendations() {
      try {
        const response = await fetch(dataFile, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        recommendations = await response.json();
      } catch (error) {
        recommendations = loadEmbeddedRecommendations();
        if (recommendations) {
          showNotice(
            `Loaded embedded recommendations. For freshest JSON data, open http://localhost:8000/recommended_jobs.html while the local server is running.`
          );
        } else {
          showNotice(
            `Could not load ${dataFile}. Open http://localhost:8000/recommended_jobs.html while the local server is running.`
          );
          elements.generatedText.textContent = "Could not load recommendations.";
          return;
        }
      }
      initializeSummary(recommendations);
      render();
    }

    elements.searchInput.addEventListener("input", render);
    elements.goJobs.addEventListener("change", handleToggle);
    elements.considerJobs.addEventListener("change", handleToggle);
    elements.toggleAppliedButton.addEventListener("click", () => {
      hideApplied = !hideApplied;
      elements.toggleAppliedButton.textContent = hideApplied ? "Show applied" : "Hide applied";
      render();
    });
    elements.exportButton.addEventListener("click", exportAppliedJobs);

    loadRecommendations();
  </script>
